name: firduty
description: Firduty Teacher Duty Roster App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP
  http: ^1.2.1
  # Local storage
  shared_preferences: ^2.2.3
  # Firebase
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.4
  # Notifications display
  flutter_local_notifications: ^17.2.2
  # Intl
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true  # Enables l10n code generation

  # ARB localization files
  # Run: flutter gen-l10n