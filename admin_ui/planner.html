<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firduty — Week Planner</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- SortableJS for drag & drop -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
</head>
<body>

<!-- ─── Header ─────────────────────────────────────────────────────────────── -->
<header class="app-header">
  <h1 data-i18n="app_title">Firduty</h1>
  <div class="header-actions">
    <button class="btn btn-lang btn-sm" onclick="I18N.toggle().then(()=>location.reload())">
      عربي | EN
    </button>
    <button class="btn btn-lang btn-sm" onclick="logout()" data-i18n="logout">Logout</button>
  </div>
</header>

<!-- ─── Main ──────────────────────────────────────────────────────────────── -->
<main class="main-content">

  <!-- Week Controls -->
  <div class="week-controls">
    <label data-i18n="select_week">Select Week:</label>
    <input type="date" id="weekStartInput" onchange="onWeekSelected()">
    <button class="btn btn-primary btn-sm" onclick="loadWeek()" data-i18n="load_week">Load</button>
    <span id="weekStatusBadge" class="week-status-badge" style="display:none"></span>
    <span id="weekVersionBadge" style="font-size:0.8rem;color:#6c757d"></span>
    <div style="margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="createWeek()" data-i18n="create_week">Create Week</button>
      <button class="btn btn-secondary btn-sm" onclick="cloneWeek()" data-i18n="clone_last_week">Clone</button>
      <button class="btn btn-warning btn-sm" onclick="saveDraft()" data-i18n="save_draft">Save Draft</button>
      <button class="btn btn-success btn-sm" onclick="publishWeek()" data-i18n="publish_week">Publish</button>
    </div>
  </div>

  <!-- Planner Layout: Sidebar + Main -->
  <div class="planner-layout">
    <!-- Teacher Sidebar -->
    <aside class="sidebar">
      <h3 data-i18n="teachers">Teachers</h3>
      <div class="teacher-list" id="teacherList">
        <div class="spinner"></div>
      </div>
    </aside>

    <!-- Day Tabs + Shift Content -->
    <div class="planner-main">
      <!-- Day Tabs -->
      <div class="tabs" id="dayTabs"></div>

      <!-- Day Panels -->
      <div id="dayPanels">
        <p style="color:#6c757d;text-align:center;margin-top:40px" id="noPlanMsg" data-i18n="no_week">No plan found for this week.</p>
      </div>
    </div>
  </div>
</main>

<!-- ─── Toast Container ───────────────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/i18n.js"></script>
<script src="js/planner.js"></script>
<script>
  // Auth guard
  if (!localStorage.getItem('firduty_token')) {
    window.location.href = 'login.html';
  }
  // Init i18n then load planner
  I18N.load(localStorage.getItem('firduty_lang') || 'ar').then(() => initPlanner());
</script>
</body>
</html>
