<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firduty — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Language toggle -->
      <div style="text-align:center;margin-bottom:16px">
        <button class="btn btn-secondary btn-sm" id="langToggle" onclick="toggleLang()">EN | عربي</button>
      </div>

      <h2 data-i18n="app_title">Firduty</h2>

      <div id="errorMsg" class="alert alert-danger" style="display:none"></div>

      <div class="form-group">
        <label data-i18n="username">Username</label>
        <input type="text" id="username" data-i18n-placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label data-i18n="password">Password</label>
        <input type="password" id="password" data-i18n-placeholder="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()" data-i18n="sign_in">Sign In</button>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/login.js"></script>
  <script>
    // Initialize i18n on page load
    I18N.load(localStorage.getItem('firduty_lang') || 'ar');
  </script>
</body>
</html>
